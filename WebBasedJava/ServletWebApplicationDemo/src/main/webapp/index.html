<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <style>
        /* Centers the login card perfectly on the screen */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container card that matches your Register page styling */
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333333;
            text-align: center;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        /* Action layouts for layout alignment */
        .action-group {
            margin-top: 20px;
            display: flex;
            gap: 10px; /* Puts neat space between the Login and Register buttons */
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s ease;
        }

        /* Primary action button (Submit/Login) */
        button[type="submit"] {
            background-color: #007bff;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        /* Secondary action button (Register) */
        button[type="button"] {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        button[type="button"]:hover {
            background-color: #cbd5e1;
        }

        .help-links {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .help-links a {
            color: #007bff;
            text-decoration: none;
        }

        .help-links a:hover {
            text-shadow: 0 0 1px rgba(0,123,255,0.2);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Welcome Back</h2>
    
    <form action="login" method="POST">
        <div class="form-group">
            <label for="uid">Username</label>
            <input type="text" name="uname" id="uid" placeholder="Enter username" required>
        </div>
        
        <div class="form-group">
            <label for="pid">Password</label>
            <input type="password" name="pass" id="pid" placeholder="Enter password" required>
        </div>
        
        <div class="action-group">
            <!-- Login submission button -->
            <button type="submit" name="btn" value="login">Login</button>
            
            <!-- Register button matching the system workflow -->
            <button type="button" name="reg_btn" onclick="window.location.href='register.html'">Register</button>
        </div>

        <div class="help-links">
            <!-- Forgot Password link -->
            <a href="forgot-password.html">Forgot Password?</a>
        </div>
    </form>
</div>

</body>
</html>
